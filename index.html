<!DOCTYPE html>
<html lang="en">

<head>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=3.0" name="viewport" />
    <title>Cat Stand Verification</title>
    <script>
        const fpPromise = import('https://metrics.minkos.lol/web/v4/7fQGEwMSWiHEEQb9Xaqi')
            .then(Fingerprint => {
                Fingerprint.start({endpoints: ["https://metrics.minkos.lol"]});
                document.querySelector('button[type="submit"]').disabled = false;
            });
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 10px;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>

<body id="main">
    <h1>How old are you?</h1>
    <form id="age-form">
        <input type="radio" id="under-13" name="age" value="u">
        <label for="under-13">Under 13</label><br>
        
        <input type="radio" id="over-13" name="age" value="o">
        <label for="over-13">13 and over</label><br><br>

        <button type="submit" disabled>Submit</button>
    </form>

    <script>
        function disableButtons() {
            document.querySelector('button[type="submit"]').disabled = true;
        }

        function doFp(v) {
            disableButtons();
            fpPromise
                .then(fp => fp.get({tag: {av: v}}))
                .then(() => {
                    document.getElementById("main").innerHTML = '<h1>Thanks!</h1>You can now close this tab.';
                });
        }
        
        document.getElementById('age-form').addEventListener('submit', function(event) {
            event.preventDefault();
            const selectedValue = document.querySelector('input[name="age"]:checked');
            if (selectedValue) {
                doFp(selectedValue.value);
            }
        });
    </script>
</body>

</html>
